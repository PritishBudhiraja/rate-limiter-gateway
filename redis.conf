# ──────────────────────────────────────────────
# Redis 7 Configuration for Rate Limiter Gateway
# ──────────────────────────────────────────────

# REDIS LEARNING NOTE: maxmemory sets the upper bound of RAM Redis can use.
# Once this limit is hit, Redis applies the eviction policy below to free space.
maxmemory 256mb

# REDIS LEARNING NOTE: allkeys-lru means "when memory is full, evict the
# Least Recently Used key from ALL keys (not just ones with an EXPIRE set)."
# Other options include: volatile-lru (only keys with TTL), allkeys-random,
# noeviction (return errors when full). For a rate limiter, allkeys-lru is
# ideal because stale rate-limit keys are the least recently used and get
# evicted first.
maxmemory-policy allkeys-lru

# Bind to all interfaces so the Node app container can connect
bind 0.0.0.0

# Disable protected mode for Docker networking
protected-mode no
